<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Commute - Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        .leaflet-routing-container { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body class="bg-white dark:bg-slate-900 h-screen w-screen overflow-hidden text-slate-800 dark:text-white flex flex-col-reverse md:flex-row transition-colors duration-300">

    <div id="ui-panel" class="w-full md:w-[400px] lg:w-[450px] h-[50vh] md:h-screen bg-white dark:bg-slate-900 shadow-[0_0_40px_rgba(0,0,0,0.1)] z-[1000] flex flex-col relative">
        
        <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-black text-blue-600 dark:text-blue-400 tracking-tight">Smart Commute</h1>
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Route Dashboard</p>
            </div>
            <button onclick="toggleTheme()" class="p-2 bg-slate-50 dark:bg-slate-800 rounded-lg hover:bg-slate-100 transition">
                <span id="themeIcon">🌙</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
            
            <div id="inputSection" class="flex flex-col gap-4">
                <div class="relative flex gap-2">
                    <button onclick="useMyLocation()" class="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-xl flex items-center justify-center hover:bg-blue-100 transition shrink-0" title="My Location">📍</button>
                    <input type="text" id="origin" placeholder="Where from?" class="w-full h-12 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-blue-500 font-medium transition">
                    <div id="origin-suggestions" class="absolute top-full left-14 mt-1 w-[calc(100%-3.5rem)] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl hidden max-h-48 overflow-y-auto z-50"></div>
                </div>

                <div class="relative">
                    <input type="text" id="dest" placeholder="Where to?" class="w-full h-12 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-blue-500 font-medium transition">
                    <div id="dest-suggestions" class="absolute top-full left-0 mt-1 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl hidden max-h-48 overflow-y-auto z-50"></div>
                </div>

                <div class="flex gap-2">
                    <select id="vehicle" class="w-1/3 h-12 px-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none cursor-pointer font-medium text-center">
                        <option value="driving">🚗 Car</option>
                        <option value="cycling">🏍️ Bike</option>
                    </select>
                    <button onclick="checkTraffic()" id="mainGoBtn" class="flex-1 h-12 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-md active:scale-95">Find Route</button>
                </div>
            </div>

            <div id="journeySection" class="hidden flex-col gap-5">
                
                <button onclick="resetApp()" class="text-xs font-bold text-red-500 hover:text-red-600 self-end flex items-center gap-1">
                    <span>❌</span> Cancel Route
                </button>

                <div id="alertArea" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 px-4 py-3 rounded-xl text-xs font-bold items-center gap-2">
                    ⚠️ <span id="hurdleText"></span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 text-center">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Distance</p>
                        <p id="distText" class="text-2xl font-black text-slate-700 dark:text-slate-200">--</p>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 text-center">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Est. Time</p>
                        <p id="timeText" class="text-2xl font-black text-green-500">--</p>
                    </div>
                    <div class="col-span-2 bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-800/50 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-blue-500 font-bold uppercase mb-1">Live Speed</p>
                            <p id="speedText" class="text-2xl font-black text-blue-600 dark:text-blue-400">0 <span class="text-sm">km/h</span></p>
                        </div>
                        <button id="voiceToggle" onclick="toggleVoice()" class="text-blue-600 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">🔊 Voice</button>
                    </div>
                </div>

                <div class="flex flex-col flex-1">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Turn-by-Turn</p>
                    <div id="stepsList" class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3 h-32 overflow-y-auto space-y-3 border border-slate-100 dark:border-slate-700">
                        <p class="text-xs text-slate-500 text-center mt-4">Awaiting route data...</p>
                    </div>
                </div>

                <button id="startBtn" class="w-full h-14 bg-slate-900 dark:bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition shadow-lg mt-2 active:scale-95">
                    ▶ START DRIVING
                </button>
            </div>

        </div>
    </div>

    <div id="map" class="w-full h-[50vh] md:h-screen md:flex-1 relative z-0 bg-slate-200 dark:bg-slate-800"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        let isDark = false;
        let watchId = null; 
        
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').innerText = isDark ? "☀️" : "🌙";
        }

        // Initialize Map
        var map = L.map('map').setView([33.6844, 73.0479], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var routingControl, vehicleMarker;

        // Reset App to default state
        function resetApp() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(vehicleMarker) map.removeLayer(vehicleMarker);
            if(routingControl) map.removeControl(routingControl);
            
            document.getElementById('journeySection').classList.replace('flex', 'hidden');
            document.getElementById('inputSection').classList.replace('hidden', 'flex');
            
            document.getElementById('mainGoBtn').innerHTML = "Find Route";
            document.getElementById('mainGoBtn').disabled = false;
            
            map.setView([33.6844, 73.0479], 12); // Reset view
        }

        let isVoiceEnabled = true;
        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('voiceToggle');
            btn.innerHTML = isVoiceEnabled ? "🔊 Voice" : "🔇 Muted";
            btn.classList.toggle('opacity-50', !isVoiceEnabled);
            window.speechSynthesis.cancel();
        }

        function speakVoice(text) {
            if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0; msg.pitch = 1.1; msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        // Search Autocomplete Logic
        let searchTimeout;
        async function handleSearch(e, type) {
            clearTimeout(searchTimeout);
            const val = e.target.value;
            const suggBox = document.getElementById(`${type}-suggestions`);
            if (val.length < 3) { suggBox.classList.add('hidden'); return; }
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/search?q=${val}`);
                    const data = await res.json();
                    if (data.length > 0) {
                        suggBox.innerHTML = data.map(item => {
                            const shortName = item.display_name.split(',')[0].replace(/'/g, "\\'");
                            const fullName = item.display_name.replace(/'/g, "\\'");
                            return `<div class="p-3 border-b border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer flex flex-col" onclick="selectLocation('${type}', '${shortName}')"><span class="font-bold text-sm">${shortName}</span><span class="text-[10px] text-slate-500 truncate">${fullName}</span></div>`}).join('');
                        suggBox.classList.remove('hidden');
                    } else { suggBox.classList.add('hidden'); }
                } catch(err) {}
            }, 500);
        }
        
        function selectLocation(type, name) { 
            document.getElementById(type).value = name; 
            document.getElementById(`${type}-suggestions`).classList.add('hidden'); 
        }
        document.getElementById('origin').addEventListener('input', (e) => handleSearch(e, 'origin'));
        document.getElementById('dest').addEventListener('input', (e) => handleSearch(e, 'dest'));

        function useMyLocation() {
            const originInput = document.getElementById('origin'); 
            originInput.value = "Locating... ⏳";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    var lat = position.coords.latitude; var lon = position.coords.longitude;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await res.json();
                        originInput.value = data.address.city || data.address.town || "My Location";
                    } catch(e) { originInput.value = "My Location"; }
                }, () => { originInput.value = "Failed to get location"; }, { enableHighAccuracy: true });
            }
        }

        // Main Route Fetching
        async function checkTraffic() {
            const origin = document.getElementById('origin').value;
            const dest = document.getElementById('dest').value;
            const vehicle = document.getElementById('vehicle').value;

            if(!origin || !dest) { alert("Please enter both locations."); return; }

            const mainBtn = document.getElementById('mainGoBtn');
            mainBtn.innerHTML = "Fetching... ⏳"; mainBtn.disabled = true;

            try {
                const res = await fetch(`/get_route?origin=${origin}&destination=${dest}`);
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();

                if (data.status === "success") {
                    
                    // Switch UI State
                    document.getElementById('inputSection').classList.replace('flex', 'hidden');
                    document.getElementById('journeySection').classList.replace('hidden', 'flex');

                    // Set Route
                    if(routingControl) map.removeControl(routingControl);
                    if(vehicleMarker) map.removeLayer(vehicleMarker);

                    const startBtn = document.getElementById('startBtn');
                    startBtn.disabled = false; 
                    startBtn.innerHTML = '▶ START DRIVING';
                    startBtn.className = "w-full h-14 bg-slate-900 dark:bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition shadow-lg mt-2 active:scale-95";

                    routingControl = L.Routing.control({
                        waypoints: [L.latLng(data.origin_coords.lat, data.origin_coords.lon), L.latLng(data.dest_coords.lat, data.dest_coords.lon)],
                        router: L.Routing.osrmv1({ profile: vehicle }),
                        addWaypoints: false, draggableWaypoints: false, show: false,
                        fitSelectedRoutes: true, // Auto focus map on line
                        lineOptions: { styles: [{color: '#2563eb', opacity: 0.9, weight: 6}] }
                    }).addTo(map);

                    routingControl.on('routesfound', async function(e) {
                        const route = e.routes[0];
                        const summary = route.summary;
                        
                        document.getElementById('distText').innerHTML = `${(summary.totalDistance/1000).toFixed(1)} <span class="text-xs font-normal">km</span>`;
                        document.getElementById('timeText').innerHTML = `${Math.round(summary.totalTime/60)} <span class="text-xs font-normal">min</span>`;

                        if(data.hurdle) {
                            document.getElementById('alertArea').classList.replace('hidden', 'flex');
                            document.getElementById('hurdleText').innerText = data.hurdle + " ahead";
                        } else { document.getElementById('alertArea').classList.replace('flex', 'hidden'); }

                        let stepsHtml = "";
                        route.instructions.forEach((instr, idx) => { 
                            stepsHtml += `<div class='flex gap-3 items-start border-b border-slate-100 dark:border-slate-700 pb-2'><div class="bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded w-5 h-5 flex items-center justify-center text-[10px] font-black shrink-0 mt-0.5">${idx+1}</div><span class="text-xs font-medium text-slate-700 dark:text-slate-300">${instr.text}</span></div>`; 
                        });
                        document.getElementById('stepsList').innerHTML = stepsHtml;

                        startBtn.onclick = () => {
                            speakVoice(`Starting navigation to ${dest}.`);
                            startRealDrive(data.dest_coords.lat, data.dest_coords.lon, vehicle, startBtn);
                        };
                    });
                } else {
                    resetApp();
                    alert("Failed to find route.");
                }
            } catch (error) {
                resetApp();
                alert("Server connection failed.");
            }
        }

        // Live Tracking
        function startRealDrive(destLat, destLon, type, btnElement) {
            if (!("geolocation" in navigator)) { alert("GPS tracking not supported."); return; }

            btnElement.disabled = true;
            btnElement.innerHTML = "🛰️ TRACKING LIVE";
            btnElement.className = "w-full h-14 bg-red-500 text-white rounded-xl font-bold text-sm shadow-lg transition mt-2";

            const icon = type === 'driving' ? '🚗' : '🏍️';
            const destLatLng = L.latLng(destLat, destLon);
            let lastUpdateTime = 0;

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    let now = Date.now();
                    if (now - lastUpdateTime < 2000) return; 
                    lastUpdateTime = now;

                    let lat = position.coords.latitude;
                    let lng = position.coords.longitude;
                    let currentLatLng = L.latLng(lat, lng);

                    if (!vehicleMarker) {
                        vehicleMarker = L.marker(currentLatLng, { icon: L.divIcon({ html: `<div style="font-size: 32px;">${icon}</div>`, className: '' }), zIndexOffset: 1000 }).addTo(map);
                    } else {
                        vehicleMarker.setLatLng(currentLatLng);
                    }
                    
                    map.panTo(currentLatLng);

                    let speedMps = position.coords.speed || 0; 
                    let speedKmh = Math.round(speedMps * 3.6);
                    document.getElementById('speedText').innerHTML = `${speedKmh} <span class="text-sm">km/h</span>`;

                    let remainingMeters = map.distance(currentLatLng, destLatLng);
                    let remainingKm = (remainingMeters / 1000).toFixed(1);
                    document.getElementById('distText').innerHTML = `${remainingKm} <span class="text-xs font-normal">km</span>`;

                    if (remainingMeters < 50) {
                        navigator.geolocation.clearWatch(watchId);
                        document.getElementById('speedText').innerHTML = `0 <span class="text-sm">km/h</span>`;
                        btnElement.innerHTML = "✅ ARRIVED";
                        btnElement.className = "w-full h-14 bg-green-500 text-white rounded-xl font-bold text-sm shadow-lg transition mt-2";
                        speakVoice("You have arrived.");
                    }
                },
                (error) => {},
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }
    </script>
</body>
</html>
