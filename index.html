<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safar Asaan - Premium Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaflet-routing-container { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 h-screen w-screen overflow-hidden font-sans transition-colors duration-500">

    <!-- Map Background -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- Main UI Container -->
    <div class="absolute inset-0 z-[1000] pointer-events-none flex flex-col justify-end md:justify-start md:p-6">
        
        <!-- Top Navigation Bar (Always Visible) -->
        <div class="p-4 md:p-0 pointer-events-auto w-full md:w-[400px]">
            <div class="glass p-5 rounded-[24px] shadow-2xl flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white leading-none">Safar <span class="text-blue-600">Asaan</span></h1>
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] mt-1">Premium Navigator</p>
                </div>
                <div class="flex gap-2">
                    <div id="weather-widget" class="hidden flex items-center gap-2 bg-blue-500/10 dark:bg-blue-400/10 px-3 py-1.5 rounded-full border border-blue-500/10">
                        <span id="w-icon" class="text-lg">☀️</span>
                        <span id="w-temp" class="text-sm font-bold dark:text-white">--°C</span>
                    </div>
                    <button onclick="toggleTheme()" class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 transition active:scale-95">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search Card (Bottom on Mobile, Below Header on Desktop) -->
        <div id="search-card" class="p-4 md:p-0 md:mt-4 pointer-events-auto w-full md:w-[400px]">
            <div class="glass p-6 rounded-[32px] shadow-2xl space-y-4">
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-600">🔵</div>
                    <input type="text" id="origin" placeholder="Mulaqat kahan se? (Origin)" class="w-full pl-12 pr-12 py-4 bg-slate-100/50 dark:bg-slate-800/50 rounded-2xl text-sm font-semibold outline-none focus:ring-2 ring-blue-500/20 dark:text-white transition">
                    <button onclick="useMyLocation()" class="absolute right-4 top-1/2 -translate-y-1/2 hover:scale-125 transition">📍</button>
                    <div id="origin-suggestions" class="absolute bottom-full md:top-full left-0 right-0 mb-2 md:mb-0 md:mt-2 glass rounded-2xl shadow-xl hidden max-h-60 overflow-y-auto z-[2000] custom-scrollbar"></div>
                </div>

                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-red-500">📍</div>
                    <input type="text" id="dest" placeholder="Kahan jana hai? (Destination)" class="w-full pl-12 pr-4 py-4 bg-slate-100/50 dark:bg-slate-800/50 rounded-2xl text-sm font-semibold outline-none focus:ring-2 ring-blue-500/20 dark:text-white transition">
                    <div id="dest-suggestions" class="absolute bottom-full md:top-full left-0 right-0 mb-2 md:mb-0 md:mt-2 glass rounded-2xl shadow-xl hidden max-h-60 overflow-y-auto z-[2000] custom-scrollbar"></div>
                </div>

                <div class="flex gap-3 pt-2">
                    <select id="vehicle" class="w-1/3 py-4 glass rounded-2xl text-sm font-bold appearance-none text-center outline-none cursor-pointer hover:bg-white dark:hover:bg-slate-800 transition">
                        <option value="driving">🚗 Car</option>
                        <option value="cycling">🏍️ Bike</option>
                    </select>
                    <button id="findRouteBtn" onclick="checkTraffic()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-sm shadow-[0_10px_20px_rgba(37,99,235,0.3)] active:scale-95 transition-all">Safar Shuru Karein</button>
                </div>
            </div>
        </div>

        <!-- Journey Details Card -->
        <div id="journey-card" class="hidden p-4 md:p-0 md:mt-4 pointer-events-auto w-full md:w-[400px]">
            <div class="glass p-6 rounded-[32px] shadow-2xl flex flex-col gap-6 max-h-[60vh] md:max-h-[70vh] overflow-hidden">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-slate-900 dark:text-white">Route Details</h3>
                    <button onclick="resetApp()" class="text-[10px] font-black text-red-500 uppercase tracking-widest px-3 py-1 rounded-full bg-red-50 dark:bg-red-900/20">Cancel</button>
                </div>

                <div id="alert-area" class="hidden bg-orange-500/10 border border-orange-500/20 p-4 rounded-2xl flex items-center gap-3">
                    <span class="text-xl">⚠️</span>
                    <p id="hurdleText" class="text-xs font-bold text-orange-600 dark:text-orange-400"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-500/5 dark:bg-slate-800/50 p-4 rounded-2xl text-center border border-blue-500/10">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Fasla</p>
                        <p id="distText" class="text-xl font-black text-slate-900 dark:text-white">--</p>
                    </div>
                    <div class="bg-blue-500/5 dark:bg-slate-800/50 p-4 rounded-2xl text-center border border-blue-500/10">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Waqt</p>
                        <p id="timeText" class="text-xl font-black text-green-600">--</p>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Directions</p>
                    <div id="stepsList" class="space-y-3"></div>
                </div>

                <button id="startBtn" class="w-full py-5 bg-slate-900 dark:bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition group">
                    <span class="group-hover:mr-2 transition-all">🚀</span> START DRIVING
                </button>
            </div>
        </div>
    </div>

    <!-- Speedometer Floating -->
    <div id="speedo" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-full shadow-2xl z-[1000] flex items-baseline gap-2 pointer-events-auto">
        <span id="speedText" class="text-4xl font-black text-blue-600">0</span>
        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">km/h</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        let isDark = false;
        let watchId = null; 
        let routingControl, vehicleMarker;

        // Theme Logic
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').innerText = isDark ? "☀️" : "🌙";
            const mapContainer = document.getElementById('map');
            if (isDark) mapContainer.classList.add('map-dark');
            else mapContainer.classList.remove('map-dark');
        }

        // Initialize Map
        var map = L.map('map', { zoomControl: false }).setView([33.6844, 73.0479], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function resetApp() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(vehicleMarker) map.removeLayer(vehicleMarker);
            if(routingControl) map.removeControl(routingControl);
            
            document.getElementById('journey-card').classList.add('hidden');
            document.getElementById('journey-card').classList.remove('flex');
            document.getElementById('search-card').classList.remove('hidden');
            document.getElementById('speedo').classList.add('hidden');
            document.getElementById('speedo').classList.remove('flex');
            document.getElementById('weather-widget').classList.add('hidden');
            
            document.getElementById('origin').value = "";
            document.getElementById('dest').value = "";
            document.getElementById('findRouteBtn').innerHTML = "Safar Shuru Karein";
            document.getElementById('findRouteBtn').disabled = false;
            
            map.setView([33.6844, 73.0479], 12);
        }

        // Autocomplete — Pakistan-biased search with full location names
        let searchTimeout;
        let searchResults = {}; // Store results for selection

        async function handleSearch(e, type) {
            clearTimeout(searchTimeout);
            const val = e.target.value.trim();
            const suggBox = document.getElementById(`${type}-suggestions`);
            if (val.length < 2) { suggBox.classList.add('hidden'); return; }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/search?q=${encodeURIComponent(val)}`);
                    const data = await res.json();
                    searchResults[type] = data; // Cache results
                    if (data && data.length > 0) {
                        suggBox.innerHTML = data.map((item, idx) => {
                            // Build a readable name: area, city/district, province
                            const parts = item.display_name.split(',').map(p => p.trim());
                            const mainName = parts[0];
                            const subInfo = parts.slice(1, 3).join(', ');
                            return `<div class="p-4 border-b border-white/10 hover:bg-blue-500/10 cursor-pointer transition-colors" onclick="selectLocation('${type}', ${idx})">
                                <p class="font-bold text-sm dark:text-white">${mainName}</p>
                                <p class="text-[10px] text-slate-500 truncate">${subInfo}</p>
                            </div>`}).join('');
                        suggBox.classList.remove('hidden');
                    } else { 
                        suggBox.innerHTML = `<div class="p-4 text-center text-xs text-slate-400">Koi jagah nahi mili "${val}" ke liye</div>`;
                        suggBox.classList.remove('hidden');
                    }
                } catch(err) { console.error(err); }
            }, 500); // 500ms Debounce — faster response
        }

        function selectLocation(type, index) {
            const item = searchResults[type][index];
            if (!item) return;
            // Store readable display name for accurate geocoding
            const parts = item.display_name.split(',').map(p => p.trim());
            const displayValue = parts.slice(0, 3).join(', ');
            document.getElementById(type).value = displayValue;
            document.getElementById(`${type}-suggestions`).classList.add('hidden');
        }

        document.getElementById('origin').addEventListener('input', (e) => handleSearch(e, 'origin'));
        document.getElementById('dest').addEventListener('input', (e) => handleSearch(e, 'dest'));

        function useMyLocation() {
            const input = document.getElementById('origin');
            input.value = "Locating... ⏳";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    input.value = data.address.city || data.address.town || "My Location";
                } catch(e) { input.value = "My Location"; }
            }, () => input.value = "GPS Error", { enableHighAccuracy: true });
        }

        // Fetch Weather
        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`/get_weather?lat=${lat}&lon=${lon}`);
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('weather-widget').classList.remove('hidden');
                    document.getElementById('w-icon').innerText = data.current_icon;
                    document.getElementById('w-temp').innerText = `${Math.round(data.current_temp)}°C`;
                }
            } catch(e) {}
        }

        async function checkTraffic() {
            const origin = document.getElementById('origin').value;
            const dest = document.getElementById('dest').value;
            const vehicle = document.getElementById('vehicle').value;

            if(!origin || !dest) return alert("Please enter both locations.");

            const btn = document.getElementById('findRouteBtn');
            btn.innerHTML = "Raasta dhoond rahe hain... ⏳";
            btn.disabled = true;

            try {
                const res = await fetch(`/get_route?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(dest)}`);
                const data = await res.json();

                if (data.status === "success") {
                    document.getElementById('search-card').classList.add('hidden');
                    document.getElementById('journey-card').classList.remove('hidden');
                    document.getElementById('journey-card').classList.add('flex');
                    
                    updateWeather(data.dest_coords.lat, data.dest_coords.lon);

                    if(routingControl) map.removeControl(routingControl);
                    routingControl = L.Routing.control({
                        waypoints: [L.latLng(data.origin_coords.lat, data.origin_coords.lon), L.latLng(data.dest_coords.lat, data.dest_coords.lon)],
                        router: L.Routing.osrmv1({ profile: vehicle }),
                        addWaypoints: false, draggableWaypoints: false, show: false,
                        fitSelectedRoutes: true,
                        lineOptions: { styles: [{color: '#2563eb', opacity: 0.8, weight: 8}] }
                    }).addTo(map);

                    routingControl.on('routesfound', (e) => {
                        const route = e.routes[0];
                        document.getElementById('distText').innerText = `${(route.summary.totalDistance/1000).toFixed(1)} km`;
                        document.getElementById('timeText').innerText = `${Math.round(route.summary.totalTime/60)} min`;
                        
                        let steps = "";
                        route.instructions.forEach(i => {
                            steps += `<div class="flex gap-3 text-xs font-medium dark:text-slate-300 border-b border-white/5 pb-2">
                                <span class="text-blue-500">➜</span> ${i.text}
                            </div>`;
                        });
                        document.getElementById('stepsList').innerHTML = steps;

                        if(data.hurdle) {
                            document.getElementById('alert-area').classList.remove('hidden');
                            document.getElementById('hurdleText').innerText = data.hurdle + " ahead! Be careful.";
                        } else {
                            document.getElementById('alert-area').classList.add('hidden');
                        }

                        document.getElementById('startBtn').onclick = () => startTracking(data.dest_coords, vehicle);
                    });
                } else {
                    alert(data.message || "Failed to find route.");
                    resetApp();
                }
            } catch(e) {
                alert("Server error.");
                resetApp();
            }
        }

        function startTracking(dest, type) {
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('speedo').classList.remove('hidden');
            document.getElementById('speedo').classList.add('flex');
            
            const icon = type === 'driving' ? '🚗' : '🏍️';
            const destLatLng = L.latLng(dest.lat, dest.lon);

            watchId = navigator.geolocation.watchPosition((pos) => {
                const current = L.latLng(pos.coords.latitude, pos.coords.longitude);
                if (!vehicleMarker) {
                    vehicleMarker = L.marker(current, { icon: L.divIcon({ html: `<div class="text-4xl shadow-xl">${icon}</div>`, className: '' }) }).addTo(map);
                } else {
                    vehicleMarker.setLatLng(current);
                }
                map.panTo(current);
                
                document.getElementById('speedText').innerText = Math.round((pos.coords.speed || 0) * 3.6);
                const dist = map.distance(current, destLatLng);
                document.getElementById('distText').innerText = `${(dist/1000).toFixed(1)} km`;

                if (dist < 50) {
                    alert("Aap manzil par pahunch gaye! ✅");
                    resetApp();
                }
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
